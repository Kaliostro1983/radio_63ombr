<!-- templates/intercepts_search.html -->
<!-- заміни блок content повністю -->

{% extends "base.html" %}

{% block content %}
<section class="intercepts-page">
  <h2>Пошук перехоплень</h2>

  <form id="searchForm" class="search-form">
    <div class="field">
      <label for="phrase">Фраза</label>
      <input id="phrase" name="phrase" type="text" placeholder="принял">
    </div>

    <div class="field">
      <label for="frequency">Частота/маска</label>
      <input id="frequency" name="frequency" type="text" placeholder="149.200">
    </div>

    <div class="field field-days">
      <label for="days">Днів</label>
      <input id="days" name="days" type="number" min="1" max="365" value="70">
    </div>

    <div class="field field-btn">
      <label>&nbsp;</label>
      <div class="action-buttons">
        <button type="submit">Пошук</button>
      </div>
    </div>
  </form>

<div id="warning" class="warning" style="display:none;"></div>
<div id="results" class="results-list"></div>
<div id="loading" class="loading" style="display:none;">Завантаження...</div>

</section>


<script src="/static/intercepts_search.js?v=2"></script>
{% endblock %}
