{% extends "base.html" %}

{% block content %}

<h2>Пошук перехоплень</h2>

<form id="searchForm" class="search-form">
  <div class="field">
    <label for="phrase">Фраза</label>
    <input id="phrase" name="phrase" type="text" placeholder="принял">
  </div>

  <div class="field">
    <label for="frequency">Частота</label>
    <input id="frequency" name="frequency" type="text" placeholder="149.200">
  </div>

  <div class="field field-days">
    <label for="days">Днів</label>
    <input id="days" name="days" type="number" min="1" max="365" value="70">
  </div>

  <div class="field field-btn">
    <label>&nbsp;</label>
    <button type="submit">Пошук</button>
  </div>
</form>

<div id="warning" class="warning" style="display:none;"></div>
<div id="results"></div>

<div id="loading" style="text-align:center; padding:20px; opacity:0.7; display:none;">
  Завантаження...
</div>

<script src="/static/intercepts_search.js"></script>

{% endblock %}
