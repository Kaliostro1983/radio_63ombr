{% extends "base.html" %}
{% block content %}
<h2 style="margin-top:0">Налаштування</h2>

<div class="card">
  <div style="font-weight:800; margin-bottom:10px">Відображення</div>

  <div class="field" style="max-width:520px">
    <label for="graphLineThicknessRange">Товщина ліній графу</label>
    <input
      id="graphLineThicknessRange"
      type="range"
      min="1"
      max="1.6"
      step="0.1"
      value="1"
      style="width:100%"
    />
    <div class="small" style="margin-top:6px">
      Поточне значення: <strong id="graphLineThicknessValue">1.0</strong>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/settings.js?v=1" defer></script>
{% endblock %}
