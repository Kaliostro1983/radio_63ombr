<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Вхід — {{ app_name }}</title>
  <script>
    (function () { try { var t = localStorage.getItem("theme"); if (t) document.documentElement.setAttribute("data-theme", t); } catch (e) {} })();
  </script>
  <link rel="stylesheet" href="/static/app.css"/>
  <style>
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { width: 100%; max-width: 360px; background: rgba(127,127,127,.06); border: 1px solid var(--border); border-radius: 14px; padding: 28px; }
    .auth-card h1 { font-size: 20px; margin: 0 0 4px; }
    .auth-sub { opacity: .6; font-size: 13px; margin: 0 0 20px; }
    .auth-field { margin-bottom: 14px; }
    .auth-field label { display: block; font-size: 13px; margin-bottom: 6px; opacity: .7; }
    .auth-field input { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--fg); outline: none; }
    .auth-btn { width: 100%; padding: 11px; border: none; border-radius: 8px; background: #2a78d6; color: #fff; font-weight: 600; cursor: pointer; }
    .auth-err { background: rgba(226,75,74,.12); border: 1px solid rgba(226,75,74,.4); color: #e24b4a; padding: 9px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <form class="auth-card" method="post" action="/login" autocomplete="off">
      <h1>Вхід</h1>
      <p class="auth-sub">{{ app_name }}</p>
      {% if error %}<div class="auth-err">{{ error }}</div>{% endif %}
      <div class="auth-field">
        <label for="login">Логін</label>
        <input id="login" name="login" type="text" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false" autofocus>
      </div>
      <div class="auth-field">
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" autocomplete="current-password">
      </div>
      <button class="auth-btn" type="submit">Увійти</button>
    </form>
  </div>
</body>
</html>
