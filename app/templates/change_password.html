{% extends "base.html" %}

{% block content %}
<section class="intercepts-page">
  <div class="page-header">
    <div class="it-page-header__title"><h1>Зміна пароля</h1></div>
  </div>

  <form method="post" action="/change-password" autocomplete="off" class="cp-card">
    {% if error %}<div class="cp-err">{{ error }}</div>{% endif %}
    {% if msg %}<div class="cp-ok">{{ msg }}</div>{% endif %}

    <div class="cp-field">
      <label for="current">Поточний пароль</label>
      <input id="current" name="current" type="password" autocomplete="current-password" autofocus>
    </div>
    <div class="cp-field">
      <label for="password">Новий пароль (мін. 8)</label>
      <input id="password" name="password" type="password" autocomplete="new-password">
    </div>
    <div class="cp-field">
      <label for="password2">Повторіть новий пароль</label>
      <input id="password2" name="password2" type="password" autocomplete="new-password">
    </div>
    <button class="cp-btn" type="submit">Змінити пароль</button>
    <p class="small" style="opacity:.6;margin:14px 0 0">
      Порада: вводьте пароль в англійській розкладці — інакше символи можуть не збігтись при вході.
    </p>
  </form>
</section>

<style>
  .cp-card { max-width: 380px; background: rgba(127,127,127,.06); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
  .cp-field { margin-bottom: 14px; }
  .cp-field label { display: block; font-size: 13px; margin-bottom: 6px; opacity: .7; }
  .cp-field input { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--fg); outline: none; }
  .cp-btn { width: 100%; padding: 11px; border: none; border-radius: 8px; background: #2a78d6; color: #fff; font-weight: 600; cursor: pointer; }
  .cp-err { background: rgba(226,75,74,.12); border: 1px solid rgba(226,75,74,.4); color: #e24b4a; padding: 9px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  .cp-ok { background: rgba(27,175,122,.12); border: 1px solid rgba(27,175,122,.4); color: #1baf7a; padding: 9px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
</style>
{% endblock %}
